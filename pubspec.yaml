name: ulama_circle
description: Islamic lectures from Nigerian Sunni scholars — Yoruba, Hausa, and English.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  firebase_messaging: ^16.4.1
  firebase_analytics: ^12.4.3
  firebase_crashlytics: ^5.2.4

  # Local storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.1.1
  path_provider: ^2.1.6

  # Networking / downloads
  dio: ^5.10.0
  connectivity_plus: ^7.2.0

  # Audio
  just_audio: ^0.10.6
  audio_service: ^0.18.19

  # UI
  carousel_slider: ^5.1.2
  cached_network_image: ^3.4.1
  share_plus: ^13.2.0

  # Search
  algoliasearch: ^1.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_ce_generator: ^1.11.2
  build_runner: ^2.15.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
